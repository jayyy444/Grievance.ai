{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card card" style="max-width:500px">
    <div class="card-body">
      <div class="auth-header">
        <div class="auth-logo"><i class="fa-solid fa-user-plus"></i></div>
        <h1 class="auth-title">Create account</h1>
        <p class="auth-sub">Join GrievanceAI — free forever</p>
      </div>
      <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="form-group">
          <label class="form-label" for="name">Full Name <span class="req">*</span></label>
          <input class="form-control" type="text" id="name" name="name" placeholder="Rahul Sharma" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email Address <span class="req">*</span></label>
          <input class="form-control" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label" for="phone">Phone Number</label>
            <input class="form-control" type="tel" id="phone" name="phone" placeholder="9876543210">
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password <span class="req">*</span></label>
            <input class="form-control" type="password" id="password" name="password" placeholder="Min. 6 characters" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="address">Address / Area</label>
          <input class="form-control" type="text" id="address" name="address" placeholder="Your locality, city">
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">
          <i class="fa-solid fa-user-plus"></i> Create Account
        </button>
      </form>
      <div class="auth-footer mt-2">
        Already have an account? <a href="{{ url_for('auth.login') }}"><strong>Sign in</strong></a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
