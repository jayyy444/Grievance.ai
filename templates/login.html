{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card card">
    <div class="card-body">
      <div class="auth-header">
        <div class="auth-logo"><i class="fa-solid fa-shield-halved"></i></div>
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Sign in to your GrievanceAI account</p>
      </div>
      <form method="POST" action="{{ url_for('auth.login') }}">
        <div class="form-group">
          <label class="form-label" for="email">Email Address <span class="req">*</span></label>
          <input class="form-control" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password <span class="req">*</span></label>
          <input class="form-control" type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:.5rem">
          <input type="checkbox" id="remember" name="remember" style="accent-color:var(--primary)">
          <label for="remember" class="text-sm" style="cursor:pointer">Keep me signed in</label>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg">
          <i class="fa-solid fa-right-from-bracket"></i> Sign In
        </button>
      </form>
      <div class="auth-footer">
        Don't have an account? <a href="{{ url_for('auth.register') }}"><strong>Register here</strong></a>
      </div>
      <div class="auth-footer" style="margin-top:.5rem;font-size:.78rem;color:var(--light)">
        Admin? Use your admin credentials to access the dashboard.
      </div>
    </div>
  </div>
</div>
{% endblock %}
